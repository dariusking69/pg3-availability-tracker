name: PG3 Availability Report Update

on:
  schedule:
    - cron: '30 12 * * 1'  # Monday 12:30 PM UTC = 8:30 AM EDT
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-availability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run availability update
        env:
          REPORTS_CLIENT_ID: ${{ secrets.REPORTS_CLIENT_ID }}
          REPORTS_CLIENT_SECRET: ${{ secrets.REPORTS_CLIENT_SECRET }}
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPFOLIO_DATABASE_NAME: ${{ secrets.APPFOLIO_DATABASE_NAME }}
          PROPERTY_GROUP_ID: ${{ secrets.PROPERTY_GROUP_ID }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS_JSON_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_JSON_CONTENT }}
        run: python main.py
